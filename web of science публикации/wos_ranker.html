<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WoS Paper Ranker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3a;
    --accent: #7c6af7;
    --accent2: #f7a26a;
    --green: #6af7a2;
    --red: #f76a6a;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --hot: #f7a26a;
    --warm: #f7e16a;
    --cool: #6af7d8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 50%, rgba(124,106,247,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(247,162,106,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }

  /* Header */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .logo-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .logo h1 {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--text) 40%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stats-header {
    display: flex;
    gap: 24px;
    align-items: flex-end;
  }

  .stat-pill {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .stat-pill .num {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
  }

  .stat-pill .label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Controls */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 16px;
    margin-bottom: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .control-group label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-family: 'DM Mono', monospace;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(124,106,247,0.5);
    transition: box-shadow 0.2s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 16px rgba(124,106,247,0.8);
  }

  .range-val {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: var(--accent);
  }

  select, input[type="text"] {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 10px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    width: 100%;
  }

  select:focus, input[type="text"]:focus {
    border-color: var(--accent);
  }

  .btn-reset {
    align-self: flex-end;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 1px;
  }

  .btn-reset:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-box input {
    padding-left: 36px;
  }

  .search-box::before {
    content: '⌕';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    z-index: 1;
    pointer-events: none;
  }

  .sort-btns {
    display: flex;
    gap: 6px;
  }

  .sort-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .sort-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .result-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  .result-count span {
    color: var(--accent2);
    font-weight: 500;
  }

  /* Table */
  .table-wrap {
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    background: var(--surface);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead tr {
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 14px 16px;
    text-align: left;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }

  th.sortable {
    cursor: pointer;
    user-select: none;
    transition: color 0.2s;
  }

  th.sortable:hover { color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid rgba(42,42,58,0.5);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(124,106,247,0.04); }

  td {
    padding: 14px 16px;
    vertical-align: top;
    line-height: 1.5;
  }

  .rank-cell {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    width: 40px;
  }

  .rank-top { color: var(--accent2); font-weight: 500; }

  .title-cell {
    max-width: 380px;
  }

  .title-text {
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .title-text a {
    color: inherit;
    text-decoration: none;
    transition: color 0.2s;
  }

  .title-text a:hover { color: var(--accent); }

  .authors {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 340px;
  }

  .journal-cell {
    max-width: 200px;
  }

  .journal-name {
    font-size: 12px;
    color: var(--cool);
    font-weight: 600;
    text-transform: capitalize;
    line-height: 1.3;
  }

  .year-badge {
    display: inline-block;
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    background: var(--border);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .cite-cell {
    text-align: center;
    width: 90px;
  }

  .cite-bar-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .cite-num {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    line-height: 1;
  }

  .cite-bar {
    width: 48px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .cite-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }

  .tier-badge {
    display: inline-block;
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 3px;
  }

  .tier-hot { background: rgba(247,162,106,0.15); color: var(--hot); border: 1px solid rgba(247,162,106,0.3); }
  .tier-warm { background: rgba(247,225,106,0.12); color: var(--warm); border: 1px solid rgba(247,225,106,0.25); }
  .tier-ok { background: rgba(106,247,210,0.1); color: var(--cool); border: 1px solid rgba(106,247,210,0.2); }
  .tier-cold { background: rgba(107,107,128,0.1); color: var(--muted); border: 1px solid rgba(107,107,128,0.2); }

  .keywords-cell {
    max-width: 180px;
  }

  .kw-tag {
    display: inline-block;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    padding: 2px 7px;
    border-radius: 4px;
    background: rgba(124,106,247,0.1);
    border: 1px solid rgba(124,106,247,0.2);
    color: var(--accent);
    margin: 2px 2px 0 0;
    white-space: nowrap;
  }

  /* Pagination */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 24px;
    padding-bottom: 8px;
  }

  .page-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .page-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .page-info {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <span class="logo-tag">Web of Science</span>
      <h1>Paper Ranker</h1>
    </div>
    <div class="stats-header">
      <div class="stat-pill">
        <span class="num" id="totalCount">2557</span>
        <span class="label">Всего статей</span>
      </div>
      <div class="stat-pill">
        <span class="num" id="shownCount">—</span>
        <span class="label">Показано</span>
      </div>
      <div class="stat-pill">
        <span class="num" id="avgCite">—</span>
        <span class="label">Средних цитат</span>
      </div>
    </div>
  </header>

  <div class="controls">
    <div class="control-group">
      <label>Мин. цитирований (WoS Core)</label>
      <input type="range" id="minCite" min="0" max="100" value="0" step="1">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-size:11px; color:var(--muted); font-family:'DM Mono',monospace;">0</span>
        <span class="range-val" id="minCiteVal">0+</span>
        <span style="font-size:11px; color:var(--muted); font-family:'DM Mono',monospace;">100</span>
      </div>
    </div>

    <div class="control-group">
      <label>Год публикации (от)</label>
      <input type="range" id="minYear" min="1974" max="2026" value="2015" step="1">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-size:11px; color:var(--muted); font-family:'DM Mono',monospace;">1974</span>
        <span class="range-val" id="minYearVal">2015</span>
        <span style="font-size:11px; color:var(--muted); font-family:'DM Mono',monospace;">2026</span>
      </div>
    </div>

    <div class="control-group">
      <label>Журнал</label>
      <select id="journalFilter">
        <option value="">— Все журналы —</option>
      </select>
    </div>

    <button class="btn-reset" onclick="resetFilters()">↺ Сбросить</button>
  </div>

  <div class="filter-bar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Поиск по названию, автору, ключевым словам...">
    </div>
    <div class="sort-btns">
      <button class="sort-btn active" data-sort="cited" onclick="setSort('cited')">↓ Цитат</button>
      <button class="sort-btn" data-sort="year" onclick="setSort('year')">↓ Год</button>
      <button class="sort-btn" data-sort="title" onclick="setSort('title')">A–Z</button>
    </div>
    <span class="result-count">Найдено: <span id="foundCount">—</span></span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Статья / Авторы</th>
          <th>Журнал</th>
          <th class="sortable" onclick="setSort('cited')">Цитат ↕</th>
          <th>Ключевые слова</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="icon">🔍</div>
      <p>Ничего не найдено. Попробуйте изменить фильтры.</p>
    </div>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<script>
const DATA_URL = 'data.json';
let allData = [];
let filtered = [];
let sortKey = 'cited';
let currentPage = 1;
const PAGE_SIZE = 25;
let maxCite = 1063;

async function loadData() {
  const resp = await fetch(DATA_URL);
  allData = await resp.json();
  maxCite = Math.max(...allData.map(d => d['Times Cited, WoS Core'] || 0));
  
  // Populate journal dropdown
  const journals = [...new Set(allData.map(d => d['Source Title']).filter(Boolean))].sort();
  const sel = document.getElementById('journalFilter');
  journals.forEach(j => {
    const opt = document.createElement('option');
    opt.value = j;
    opt.textContent = j.length > 45 ? j.substring(0, 45) + '…' : j;
    sel.appendChild(opt);
  });

  applyFilters();
}

function getTier(cite) {
  if (cite >= 50) return { cls: 'tier-hot', label: '🔥 Топ' };
  if (cite >= 15) return { cls: 'tier-warm', label: '⭐ Крутая' };
  if (cite >= 3) return { cls: 'tier-ok', label: '✓ Норм' };
  return { cls: 'tier-cold', label: '— Мало' };
}

function getCiteColor(cite) {
  if (cite >= 50) return 'var(--hot)';
  if (cite >= 15) return 'var(--warm)';
  if (cite >= 3) return 'var(--cool)';
  return 'var(--muted)';
}

function applyFilters() {
  const minCite = parseInt(document.getElementById('minCite').value);
  const minYear = parseInt(document.getElementById('minYear').value);
  const journal = document.getElementById('journalFilter').value;
  const search = document.getElementById('searchInput').value.toLowerCase().trim();

  filtered = allData.filter(d => {
    if ((d['Times Cited, WoS Core'] || 0) < minCite) return false;
    if (d['Publication Year'] > 0 && d['Publication Year'] < minYear) return false;
    if (journal && d['Source Title'] !== journal) return false;
    if (search) {
      const haystack = `${d['Article Title']} ${d['Authors']} ${d['Author Keywords']}`.toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  // Sort
  filtered.sort((a, b) => {
    if (sortKey === 'cited') return (b['Times Cited, WoS Core'] || 0) - (a['Times Cited, WoS Core'] || 0);
    if (sortKey === 'year') return (b['Publication Year'] || 0) - (a['Publication Year'] || 0);
    if (sortKey === 'title') return (a['Article Title'] || '').localeCompare(b['Article Title'] || '');
    return 0;
  });

  currentPage = 1;
  renderTable();
  renderPagination();
  updateStats();
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = filtered.slice(start, start + PAGE_SIZE);

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = pageData.map((d, i) => {
    const rank = start + i + 1;
    const cite = d['Times Cited, WoS Core'] || 0;
    const tier = getTier(cite);
    const color = getCiteColor(cite);
    const barWidth = Math.min(100, Math.round((cite / Math.min(maxCite, 200)) * 100));
    const doi = d['DOI'] ? `<a href="https://doi.org/${d['DOI']}" target="_blank">${truncate(d['Article Title'] || '—', 75)}</a>` : truncate(d['Article Title'] || '—', 75);
    const authors = truncate(d['Authors'] || '', 55);
    const journal = d['Source Title'] ? d['Source Title'].toLowerCase().replace(/\b\w/g, l => l.toUpperCase()) : '—';
    
    const keywords = (d['Author Keywords'] || '').split(';').slice(0, 4).map(k => k.trim()).filter(Boolean);
    const kwHtml = keywords.map(k => `<span class="kw-tag">${escHtml(k)}</span>`).join('');

    return `<tr>
      <td class="rank-cell ${rank <= 10 ? 'rank-top' : ''}">${rank}</td>
      <td class="title-cell">
        <div class="title-text">${doi}</div>
        <div class="authors">${escHtml(authors)}</div>
      </td>
      <td class="journal-cell">
        <div class="journal-name">${escHtml(journal)}</div>
        <span class="year-badge">${d['Publication Year'] || '?'}</span>
      </td>
      <td class="cite-cell">
        <div class="cite-bar-wrap">
          <span class="cite-num" style="color:${color}">${cite}</span>
          <div class="cite-bar"><div class="cite-bar-fill" style="width:${barWidth}%; background:${color}"></div></div>
          <span class="tier-badge ${tier.cls}">${tier.label}</span>
        </div>
      </td>
      <td class="keywords-cell">${kwHtml || '<span style="color:var(--muted); font-size:11px">—</span>'}</td>
    </tr>`;
  }).join('');
}

function renderPagination() {
  const total = filtered.length;
  const pages = Math.ceil(total / PAGE_SIZE);
  const pg = document.getElementById('pagination');

  if (pages <= 1) { pg.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>←</button>`;
  
  const range = [];
  for (let p = 1; p <= pages; p++) {
    if (p === 1 || p === pages || (p >= currentPage - 2 && p <= currentPage + 2)) range.push(p);
    else if (range[range.length - 1] !== '…') range.push('…');
  }

  range.forEach(p => {
    if (p === '…') html += `<span class="page-info">…</span>`;
    else html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
  });

  html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === pages ? 'disabled' : ''}>→</button>`;
  html += `<span class="page-info">&nbsp;${total} статей</span>`;
  pg.innerHTML = html;
}

function updateStats() {
  const count = filtered.length;
  document.getElementById('shownCount').textContent = count;
  document.getElementById('foundCount').textContent = count;
  const avg = count > 0 ? Math.round(filtered.reduce((s, d) => s + (d['Times Cited, WoS Core'] || 0), 0) / count) : 0;
  document.getElementById('avgCite').textContent = avg;
}

function goPage(p) {
  const pages = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > pages) return;
  currentPage = p;
  renderTable();
  renderPagination();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setSort(key) {
  sortKey = key;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === key));
  applyFilters();
}

function resetFilters() {
  document.getElementById('minCite').value = 0;
  document.getElementById('minYear').value = 2015;
  document.getElementById('journalFilter').value = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('minCiteVal').textContent = '0+';
  document.getElementById('minYearVal').textContent = '2015';
  applyFilters();
}

function truncate(str, n) {
  return str.length > n ? str.substring(0, n) + '…' : str;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Bind controls
document.getElementById('minCite').addEventListener('input', e => {
  document.getElementById('minCiteVal').textContent = e.target.value + '+';
  applyFilters();
});

document.getElementById('minYear').addEventListener('input', e => {
  document.getElementById('minYearVal').textContent = e.target.value;
  applyFilters();
});

document.getElementById('journalFilter').addEventListener('change', applyFilters);
document.getElementById('searchInput').addEventListener('input', applyFilters);

loadData();
</script>
</body>
